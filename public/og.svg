      <stop offset="0%" stop-color="#fff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0.15"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="#06090F"/>
  <rect width="1200" height="630" fill="url(#jaali)" mask="url(#patternFade)" opacity="0.25"/>
  <rect width="1200" height="630" fill="url(#orb)"/>

  <g transform="translate(80 90)">
