      <stop offset="0%" stop-color="#E5B65C" stop-opacity="0.25"/>
      <stop offset="55%" stop-color="#E5B65C" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#06090F" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F7D98A"/>
